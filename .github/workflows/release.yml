name: Build and Release

# This workflow automatically builds your app and creates a DMG
# whenever you create a new release on GitHub

on:
  release:
    types: [created]
  workflow_dispatch:  # Allows manual triggering from GitHub Actions tab

jobs:
  build:
    runs-on: macos-latest  # Uses GitHub's Mac computer to build
    permissions:
      contents: write

    steps:
      # Step 1: Download your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install system dependencies
      - name: Install system dependencies
        run: |
          brew install portaudio

      # Step 4: Install Python dependencies
      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 5: Build the .app bundle
      - name: Build app
        run: |
          python3 setup.py py2app

      # Step 6: Fix MLX library rpaths (required for MLX to load correctly)
      - name: Fix MLX library rpaths
        run: |
          # Detect Python version
          PYTHON_VERSION=$(python3 -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')
          echo "Python version: $PYTHON_VERSION"

          # Paths
          MLX_CORE_SO="dist/Not Wispr Flow.app/Contents/Resources/lib/python${PYTHON_VERSION}/lib-dynload/mlx/core.so"
          FRAMEWORKS_DIR="dist/Not Wispr Flow.app/Contents/Frameworks"

          # Fix rpath so core.so can find libmlx.dylib in Frameworks directory
          if [ -f "$MLX_CORE_SO" ]; then
            echo "Fixing rpath for mlx/core.so..."
            # core.so is 5 levels deep from Contents: mlx -> lib-dynload -> python3.X -> lib -> Resources -> Contents
            install_name_tool -add_rpath "@loader_path/../../../../../Frameworks" "$MLX_CORE_SO"
            echo "✓ Fixed rpath for mlx/core.so"
          else
            echo "⚠️  Warning: mlx/core.so not found at $MLX_CORE_SO"
            exit 1
          fi

          # Move mlx.metallib to Frameworks (must be colocated with libmlx.dylib)
          METALLIB_SOURCE="dist/Not Wispr Flow.app/Contents/Resources/mlx.metallib"
          METALLIB_DEST="$FRAMEWORKS_DIR/mlx.metallib"

          if [ -f "$METALLIB_SOURCE" ]; then
            echo "Moving mlx.metallib to Frameworks..."
            mv "$METALLIB_SOURCE" "$METALLIB_DEST"
            echo "✓ Moved mlx.metallib to Frameworks"
          else
            echo "⚠️  Warning: mlx.metallib not found at $METALLIB_SOURCE"
          fi

      # Step 7: Ad-hoc sign the app (no certificate needed)
      - name: Sign app
        run: |
          codesign --force --deep --sign - "dist/Not Wispr Flow.app" || true

      # Step 8: Create DMG
      - name: Create DMG
        id: create_dmg
        run: |
          # Extract version from tag if triggered by release, otherwise use 1.0.0
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Strip refs/tags/ prefix, then strip leading v
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="1.0.0"
          fi
          echo "Building DMG with version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          ./scripts/create_dmg.sh "$VERSION"

      # Step 9: Upload DMG to the release (only if triggered by release)
      - name: Upload DMG to release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./dist/NotWisprFlow-${{ steps.create_dmg.outputs.version }}.dmg
          asset_name: NotWisprFlow-${{ steps.create_dmg.outputs.version }}.dmg
          asset_content_type: application/x-apple-diskimage

      # Step 10: Save DMG as artifact (backup in case upload fails)
      - name: Save DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NotWisprFlow-DMG
          path: dist/NotWisprFlow-*.dmg
          retention-days: 7

      # Step 11: Calculate SHA256 for Homebrew
      - name: Calculate SHA256
        id: sha
        run: |
          SHA256=$(shasum -a 256 dist/NotWisprFlow-*.dmg | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"
          echo ""
          echo "============================================"
          echo "📋 COPY THIS SHA256 FOR HOMEBREW:"
          echo "$SHA256"
          echo "============================================"

      # Step 12: Update release with SHA256 (for Homebrew cask)
      - name: Add SHA256 to release notes
        if: github.event_name == 'release'
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id
            });

            const existingBody = release.data.body || '';
            const sha256Section = '\n\n---\n\n### 🍺 Homebrew Cask\n\nSHA256: `${{ steps.sha.outputs.sha256 }}`\n\nUse this hash when updating the Homebrew cask formula.';
            const newBody = existingBody + sha256Section;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: newBody
            });
